<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Scratch Phrase</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111;
        color: white;
        font-family: sans-serif;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
    }

	.player-area {
	    display: flex;
	    justify-content: center;
	    gap: 60px;
	}

	/* 1個ずつのセット */
	.deck {
	    position: relative;
	}
	
    /* ターンテーブル */
	.turntable {
	    margin: 0 auto;
	    width: 260px;
	    height: 260px;
	    border-radius: 50%;
	    border: 8px solid #444;
	    display: flex;
	    justify-content: center;
	    align-items: center;
	    box-shadow: 0 0 20px rgba(255,255,255,0.15);

	    background:
	        repeating-radial-gradient(
	            circle,
	            #000 0px,
	            #000 2px,
	            #111 3px
	        );
	}

    /* 回転アニメーション */
	.spin {
	    animation: spinRecord 0.7s linear 1s;
	}
	
    

    @keyframes spinRecord {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }

    /* 中央ラベル */
    .label {
		
		
        width: 70px;
        height: 70px;
        background: #b22222;
        border-radius: 50%;
        border: 4px solid #ddd;
		
    }

    /* 手 */
	.hand-left {
	    position: absolute;
	    left: 50%;
	    bottom: 210px;
	    transform: translateX(-140%) rotate(25deg);
	    font-size: 60px;
	    z-index: 10;
	}

	.hand-right {
	    position: absolute;
	    left: 50%;
	    bottom: 210px;
	    transform: translateX(40%) rotate(-25deg);
	    font-size: 60px;
	    z-index: 10;
	}

    /* フレーズ表示 */
    .phrase-box {
        margin: 30px auto;
        width: 70%;
        min-height: 60px;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        background-color: #1c1c1c;
        border-radius: 12px;
    }

    /* ボタン */
    .btn {
        margin-top: 15px;
        padding: 12px 24px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #e63946;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }
	
	.marker {
	    width: 4px;
	    height: 30px;
	    background: white;
	    margin: auto;
	}
</style>
</head>

<body>

    <h1>Scratch Phrase</h1>
    <p>ボタンを押すとレコードが回ってフレーズ生成</p>

	<div class="player-area">

	    <!-- 左デッキ -->
	    <div class="deck">
	        <div id="record1" class="turntable">
	            <div class="label">
	                <div class="marker"></div>
	            </div>
	        </div>

	        <div class="hand-left">🤚</div>

	        <div id="phrase1" class="phrase-box" th:text="${phrase1}"></div>

	        <button class="btn" onclick="scratchLeft()">左スクラッチ</button>
	    </div>

	    <!-- 右デッキ -->
	    <div class="deck">
	        <div id="record2" class="turntable">
	            <div class="label">
	                <div class="marker"></div>
	            </div>
	        </div>

	        <div class="hand-right">🤚</div>

	        <div id="phrase2" class="phrase-box" th:text="${phrase2}"></div>

	        <button class="btn" onclick="scratchRight()">右スクラッチ</button>
	    </div>

	</div>
	
	
    </div>

	

    <script>
		function scratchLeft() {
		    const r1 = document.getElementById("record1");

		    r1.classList.remove("spin");
		    void r1.offsetWidth;
		    r1.classList.add("spin");

		    fetch("/scratch/left")
		        .then(res => res.text())
		        .then(data => {
		            document.getElementById("phrase1").innerText = data;
		        });
		}

		function scratchRight() {
		    const r2 = document.getElementById("record2");

		    r2.classList.remove("spin");
		    void r2.offsetWidth;
		    r2.classList.add("spin");

		    fetch("/scratch/right")
		        .then(res => res.text())
		        .then(data => {
		            document.getElementById("phrase2").innerText = data;
		        });
		}
		button.disabled = true;
		setTimeout(() => button.disabled = false, 1000);
    </script>

</body>
</html>
